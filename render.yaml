# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: New + → Blueprint → connect this repo. Render reads this file.
services:
  - type: web
    name: claude-generation-platform
    # Docker runtime so the image carries Python + WeasyPrint for the 시험지
    # module's A4 PDF renderer (scripts/exam_pdf.py). Build + start come from
    # the Dockerfile; NODE_ENV/PYTHON_BIN are set there too.
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Set the real value in the Render dashboard (sync:false = not stored in repo).
      # Leave it unset and the site still serves the UI; generation returns 401.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: claude-haiku-4-5
      - key: DEFAULT_MAX_TOKENS
        value: "4000"
      - key: ALLOWED_MODELS
        value: claude-haiku-4-5,claude-sonnet-4-6
      # Abuse / cost guards (all optional — these mirror the in-code defaults).
      - key: MAX_OUTPUT_TOKENS
        value: "16000"
      - key: RATE_LIMIT_PER_MIN
        value: "5"
      - key: RATE_LIMIT_PER_HOUR
        value: "20"
      - key: RATE_LIMIT_PER_DAY_PER_IP
        value: "30"
      - key: RATE_LIMIT_PER_DAY_GLOBAL
        value: "500"
      - key: MAX_FIELD_CHARS
        value: "3000"
      - key: MAX_INPUT_CHARS
        value: "8000"
    # NOTE: do NOT set PORT — Render injects it and the app reads process.env.PORT.
