# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: New + → Blueprint → connect this repo. Render reads this file.
services:
  - type: web
    name: claude-generation-platform
    runtime: node
    plan: free
    branch: claude/epic-cori-n6d864
    # Render sets NODE_ENV=production, which makes npm skip devDependencies;
    # --include=dev keeps TypeScript/tsx available for the build step.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Set the real value in the Render dashboard (sync:false = not stored in repo).
      # Leave it unset and the site still serves the UI; generation returns 401.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: claude-haiku-4-5
      - key: DEFAULT_MAX_TOKENS
        value: "8000"
      - key: ALLOWED_MODELS
        value: claude-haiku-4-5,claude-sonnet-4-6
    # NOTE: do NOT set PORT — Render injects it and the app reads process.env.PORT.
