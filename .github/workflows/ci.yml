name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # WeasyPrint + poppler for the golden render regression test. test:render
      # skips gracefully if these are missing, so this step is what makes it a gate.
      - name: Install WeasyPrint + poppler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pip python3-venv \
            libpango-1.0-0 libpangocairo-1.0-0 libcairo2 \
            libgdk-pixbuf-2.0-0 libffi8 libjpeg62-turbo fontconfig poppler-utils
          pip install --break-system-packages weasyprint==69.0
      - run: npm run test:render
