<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>올인원 AI — 모든 영역의 실무를 한 번에</title>
    <meta name="description" content="질문에 답만 하면 시험지·발표자료·자소서·단어장까지 완성되는 올인원 AI 작업실" />
    <meta name="theme-color" content="#F7F4EC" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Open Graph / Twitter (swap og:image for an absolute PNG URL after deploy) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="올인원 AI" />
    <meta property="og:title" content="올인원 AI — 모든 영역의 실무를 한 번에" />
    <meta property="og:description" content="처음이어도 괜찮아요. 질문에 답만 하면, 결과물이 완성됩니다." />
    <meta property="og:image" content="/og.svg" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="올인원 AI — 모든 영역의 실무를 한 번에" />
    <meta name="twitter:description" content="질문에 답만 하면, 결과물이 완성됩니다." />
    <meta name="twitter:image" content="/og.svg" />

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Decorative plant sprig (top-left) -->
    <svg class="sprig" viewBox="0 0 120 170" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
      <path d="M60 162 C 56 120, 52 86, 66 44 C 73 24, 68 12, 61 5" />
      <path d="M60 128 C 40 124, 27 112, 21 95 C 40 97, 55 107, 61 124" />
      <path d="M63 102 C 84 98, 96 86, 102 69 C 83 71, 69 81, 62 98" />
      <path d="M60 74 C 43 72, 33 62, 29 49 C 44 51, 57 60, 61 72" />
      <path d="M63 52 C 80 50, 90 41, 95 30 C 80 31, 69 39, 62 49" />
    </svg>

    <header class="topbar">
      <a class="brand" href="#" data-nav="home">
        <span class="brand-logo">✦</span>
        올인원 AI
      </a>
      <div class="nav-right">
        <a class="nav-login" href="#">로그인</a>
        <a class="btn-primary" href="#generate" data-nav="app">시작하기</a>
      </div>
    </header>

    <main>
      <!-- Landing / intro -->
      <section id="view-home" class="view">
        <div class="hero">
          <p class="eyebrow">AI, 어렵지 않아요</p>
          <h1 class="hero-title">모든 영역의 실무를<br /><span class="hero-em">한 번에</span></h1>
          <p class="hero-sub">질문에 답만 하면, 결과물이 완성됩니다.</p>
          <p class="hero-audience"><span>AI 처음이어도 괜찮아요. 초등학생부터 어르신까지.</span></p>

          <form id="hero-form" class="hero-search">
            <span class="hero-search-icon" aria-hidden="true">✦</span>
            <input id="hero-input" type="text" autocomplete="off" aria-label="무엇을 만들어 볼까요" placeholder="무엇을 만들어 볼까요?" />
            <button id="hero-go" type="submit" class="hero-arrow" aria-label="시작">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 12h14" />
                <path d="m12 5 7 7-7 7" />
              </svg>
            </button>
          </form>
        </div>

        <section class="steps" aria-labelledby="steps-title">
          <h2 class="section-title" id="steps-title">이렇게 쉬워요</h2>
          <div class="steps-row">
            <div class="step">
              <span class="step-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
              </span>
              <span class="step-title">고르기</span>
              <span class="step-desc">무엇을 만들지 골라요</span>
            </div>
            <span class="step-arrow" aria-hidden="true">→</span>
            <div class="step">
              <span class="step-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>
              </span>
              <span class="step-title">답하기</span>
              <span class="step-desc">질문에 답만 하면 돼요</span>
            </div>
            <span class="step-arrow" aria-hidden="true">→</span>
            <div class="step">
              <span class="step-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m9 15 2 2 4-4"/></svg>
              </span>
              <span class="step-title">받기</span>
              <span class="step-desc">완성된 결과물 받기</span>
            </div>
          </div>
        </section>

        <section class="gallery">
          <h2 class="section-title">무엇을 만들어 볼까요</h2>
          <p id="cards-status" class="cards-status">목록을 불러오는 중…</p>
          <div id="module-cards" class="cards"></div>
        </section>
      </section>

      <!-- Generator -->
      <section id="view-app" class="view" hidden>
        <div class="app-head">
          <h2>작업실</h2>
          <a class="back" href="#" data-nav="home">← 홈으로</a>
        </div>

        <p id="demo-banner" class="demo-banner" hidden></p>

        <form id="form" class="card-panel">
          <label class="field">
            <span class="label">모듈</span>
            <select id="module" required></select>
            <span id="module-purpose" class="module-purpose"></span>
            <span id="module-desc" class="hint"></span>
          </label>

          <button id="to-wizard" type="button" class="btn-ghost to-wizard" hidden>← 단계별로 쉽게 입력하기</button>

          <div id="wizard" class="wizard" hidden></div>

          <div id="guide-fields" class="guide-fields"></div>

          <div id="module-options" class="options-row"></div>

          <div id="ppt-design" class="ppt-design" hidden>
            <span class="label">디자인 추천 — 폰트 + 색 팔레트</span>
            <div class="ppt-design-actions">
              <button id="ppt-recommend" type="button" class="btn-ghost">추천 받기</button>
              <button id="ppt-all" type="button" class="btn-ghost">전체 보기</button>
              <span id="ppt-design-status" class="hint"></span>
            </div>
            <div id="ppt-themes" class="ppt-themes"></div>
            <div id="ppt-preview" class="ppt-preview" hidden></div>
          </div>

          <label class="field" id="extra-field">
            <span class="label" id="input-label">요청 입력</span>
            <textarea
              id="input"
              rows="3"
              placeholder="만들고 싶은 것을 적어주세요"
            ></textarea>
          </label>

          <div class="actions" id="actions-row">
            <button id="submit" type="submit" class="btn-primary">생성</button>
            <button id="demo" type="button" class="btn-ghost">예시 보기</button>
            <button id="stop" type="button" class="btn-ghost" hidden>중지</button>
            <span id="status" class="status" role="status" aria-live="polite"></span>
          </div>
        </form>

        <section class="card-panel output-card">
          <div class="output-head">
            <span class="label">결과</span>
            <button id="copy" type="button" class="link" hidden>복사</button>
          </div>
          <div id="loading" class="loading" hidden>
            <span class="spinner" aria-hidden="true"></span>
            <span>생성하는 중…</span>
          </div>
          <div id="output" class="output markdown" tabindex="0" aria-live="polite"></div>
          <p id="error" class="error" hidden></p>
        </section>
      </section>
    </main>

    <footer class="footer">올인원 AI</footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
