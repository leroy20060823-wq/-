<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>밤의 서재 — AI 글짓기 작업실</title>
    <meta name="description" content="시험지·학습지·발표자료·수업지도안·자기소개서를 짓는 AI 작업실" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#" data-nav="home">밤의 서재</a>
      <nav class="nav">
        <a href="#" data-nav="home">소개</a>
        <a href="#generate" data-nav="app">생성</a>
      </nav>
    </header>

    <main>
      <!-- Landing / intro -->
      <section id="view-home" class="view">
        <div class="hero">
          <p class="eyebrow">AI 글짓기 작업실</p>
          <h1 class="hero-title">밤의 서재</h1>
          <div class="hero-rule"></div>
          <p class="hero-tagline">고요한 밤, 필요한 자료를 한 장씩 지어 드립니다.</p>
          <p class="hero-desc">
            시험지·학습지·발표자료·수업지도안·자기소개서까지 — 모듈을 고르고 한 문장만
            적으면, Claude가 서식을 갖춘 글을 실시간으로 완성합니다.
          </p>
          <a class="btn-primary" href="#generate" data-nav="app">시작하기</a>
        </div>

        <section class="gallery">
          <h2 class="section-title">무엇을 지어 볼까요</h2>
          <p id="cards-status" class="cards-status">목록을 불러오는 중…</p>
          <div id="module-cards" class="cards"></div>
        </section>
      </section>

      <!-- Generator -->
      <section id="view-app" class="view" hidden>
        <div class="app-head">
          <h2>글 짓는 책상</h2>
          <a class="back" href="#" data-nav="home">← 소개로</a>
        </div>

        <form id="form" class="card-panel">
          <label class="field">
            <span class="label">모듈</span>
            <select id="module" required></select>
            <span id="module-desc" class="hint"></span>
          </label>

          <label class="field">
            <span class="label">요청 입력</span>
            <textarea
              id="input"
              rows="5"
              placeholder="예) 고등학교 2학년 미적분 단원평가, 객관식 10문제, 중상 난이도"
              required
            ></textarea>
          </label>

          <div class="actions">
            <button id="submit" type="submit" class="btn-primary">생성</button>
            <button id="stop" type="button" class="btn-ghost" hidden>중지</button>
            <span id="status" class="status" role="status" aria-live="polite"></span>
          </div>
        </form>

        <section class="card-panel output-card">
          <div class="output-head">
            <span class="label">결과</span>
            <button id="copy" type="button" class="link" hidden>복사</button>
          </div>
          <div id="loading" class="loading" hidden>
            <span class="spinner" aria-hidden="true"></span>
            <span>등불을 밝히는 중…</span>
          </div>
          <div id="output" class="output markdown" tabindex="0" aria-live="polite"></div>
          <p id="error" class="error" hidden></p>
        </section>
      </section>
    </main>

    <footer class="footer">밤의 서재 <span class="sep">·</span> Claude로 짓는 글</footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
